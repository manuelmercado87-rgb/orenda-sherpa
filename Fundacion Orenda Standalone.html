  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

dden;\n  -webkit-font-smoothing: antialiased;\n}\n\n/* ── NAV ─────────────────────────────────────── */\n#nav {\n  position: fixed; top: 0; left: 0; right: 0; z-index: 100;\n  padding: 20px 48px;\n  display: flex; align-items: center; justify-content: space-between;\n  transition: background 0.4s ease, padding 0.4s ease;\n}\n#nav.scrolled {\n  background: var(--white);\n  padding: 14px 48px;\n  border-bottom: 1px solid #e0e0e0;\n}\n#nav.scrolled .nav-logo,\n#nav.scrolled .nav-links a,\n#nav.scrolled .nav-cta { color: var(--black); }\n.nav-logo {\n  font-family: var(--font-display);\n  font-size: 22px;\n  letter-spacing: 0.04em;\n  color: var(--white);\n  text-decoration: none;\n  line-height: 1;\n}\n.nav-logo span { color: var(--peach); }\n.nav-links {\n  display: flex; gap: 32px; list-style: none;\n}\n.nav-links a {\n  font-size: 12px; font-weight: 600; letter-spacing: 0.1em;\n  text-transform: uppercase; color: var(--white);\n  text-decoration: none; transition: color 0.2s;\n}\n.nav-links a:hover { color: var(--peach); }\n.nav-cta {\n  font-size: 12px; font-weight: 700; letter-spacing: 0.1em;\n  text-transform: uppercase; color: var(--white);\n  background: var(--peach); padding: 10px 20px;\n  text-decoration: none; transition: background 0.2s, color 0.2s;\n}\n#nav.scrolled .nav-cta { color: var(--white); }\n.nav-cta:hover { background: var(--black); color: var(--white); }\n.nav-hamburger { display: none; flex-direction: column; gap: 5px; cursor: pointer; }\n.nav-hamburger span { width: 24px; height: 2px; background: var(--white); display: block; transition: 0.3s; }\n#nav.scrolled .nav-hamburger span { background: var(--black); }\n.mobile-menu {\n  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;\n  background: var(--black); z-index: 99; flex-direction: column;\n  align-items: center; justify-content: center; gap: 32px;\n}\n.mobile-menu.open { display: flex; }\n.mobile-menu a {\n  font-family: var(--font-display); font-size: 48px; color: var(--white);\n  text-decoration: none; letter-spacing: 0.05em;\n}\n.mobile-menu a:hover { color: var(--peach); }\n.mobile-close {\n  position: absolute; top: 24px; right: 24px;\n  color: var(--white); font-size: 32px; cursor: pointer; background: none; border: none;\n}\n\n/* ── HERO ────────────────────────────────────── */\n#hero {\n  height: 100vh; min-height: 600px;\n  position: relative; display: flex; align-items: flex-end;\n  padding: 80px 48px;\n  background: linear-gradient(135deg, #1a0a05 0%, #2d1810 30%, #3d2215 60%, #1a0805 100%);\n  overflow: hidden;\n}\n.hero-bg {\n  position: absolute; inset: 0;\n  background: \n    radial-gradient(ellipse at 60% 40%, rgba(255,143,117,0.15) 0%, transparent 60%),\n    radial-gradient(ellipse at 20% 80%, rgba(181,163,216,0.1) 0%, transparent 50%),\n    linear-gradient(180deg, rgba(0,0,0,0.3) 0%, rgba(0,0,0,0.7) 100%);\n}\n.hero-photo-hint {\n  position: absolute; inset: 0;\n  background: linear-gradient(135deg, #2c1509 0%, #4a2318 40%, #3a1c10 70%, #1f0d06 100%);\n  opacity: 0.9;\n}\n.hero-grain {\n  position: absolute; inset: 0;\n  background-image: url(\"data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E\");\n  opacity: 0.4;\n}\n.hero-label {\n  position: absolute; top: 100px; left: 48px;\n  font-size: 12px; font-weight: 600; letter-spacing: 0.15em;\n  text-transform: uppercase; color: var(--peach); opacity: 0.8;\n}\n.hero-content { position: relative; z-index: 2; max-width: 900px; }\n.hero-headline {\n  font-family: var(--font-display);\n  font-size: clamp(64px, 8vw, 110px);\n  line-height: 0.95; letter-spacing: 0.01em;\n  color: var(--white); margin-bottom: 28px;\n}\n.hero-headline em { color: var(--peach); font-style: normal; }\n.hero-sub {\n  font-size: clamp(16px, 1.5vw, 20px);\n  color: rgba(255,255,255,0.85);\n  max-width: 560px; line-height: 1.6; margin-bottom: 12px;\n}\n.hero-body {\n  font-size: 14px; color: rgba(255,255,255,0.55);\n  max-width: 480px; line-height: 1.6; margin-bottom: 40px;\n}\n.btn-hero {\n  display: inline-flex; align-items: center; gap: 10px;\n  background: var(--peach); color: var(--black);\n  font-size: 13px; font-weight: 700; letter-spacing: 0.1em;\n  text-transform: uppercase; padding: 16px 28px;\n  text-decoration: none; transition: all 0.2s;\n}\n.btn-hero:hover { background: var(--white); }\n.btn-hero .arrow { transition: transform 0.2s; }\n.btn-hero:hover .arrow { transform: translate(3px, -3px); }\n.scroll-indicator {\n  position: absolute; bottom: 40px; right: 48px;\n  display: flex; flex-direction: column; align-items: center; gap: 8px;\n  color: rgba(255,255,255,0.4); font-size: 10px; letter-spacing: 0.15em;\n  text-transform: uppercase;\n}\n.scroll-line {\n  width: 1px; height: 60px;\n  background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);\n  animation: scrollAnim 2s ease-in-out infinite;\n}\n@keyframes scrollAnim { 0%,100% { transform: scaleY(1); opacity: 0.4; } 50% { transform: scaleY(0.5); opacity: 1; } }\n\n/* ── MARQUEE ─────────────────────────────────── */\n.marquee-strip {\n  background: var(--light-peach);\n  height: 100px; overflow: hidden;\n  display: flex; align-items: center;\n  border-top: 1px solid rgba(255,143,117,0.2);\n  border-bottom: 1px solid rgba(255,143,117,0.2);\n}\n.marquee-track {\n  display: flex; gap: 0;\n  animation: marqueeScroll 20s linear infinite;\n  white-space: nowrap;\n}\n.marquee-item {\n  font-family: var(--font-display);\n  font-size: clamp(32px, 4vw, 52px);\n  letter-spacing: 0.04em; color: var(--peach);\n  padding: 0 40px; flex-shrink: 0;\n}\n@keyframes marqueeScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }\n\n.btn-hero-sec {\n  display: inline-flex; align-items: center; gap: 10px;\n  border: 1px solid rgba(255,255,255,0.3); color: var(--white);\n  font-size: 13px; font-weight: 700; letter-spacing: 0.1em;\n  text-transform: uppercase; padding: 16px 28px;\n  text-decoration: none; transition: all 0.2s;\n}\n.btn-hero-sec:hover { background: rgba(255,255,255,0.1); }\n.hero-ctas { display: flex; gap: 16px; flex-wrap: wrap; }\n.section-label {\n  font-size: 11px; font-weight: 700; letter-spacing: 0.18em;\n  text-transform: uppercase; color: var(--dark-gray);\n  margin-bottom: 16px; opacity: 0.6;\n}\n.section-title {\n  font-family: var(--font-display);\n  font-size: clamp(48px, 6vw, 80px);\n  line-height: 0.95; letter-spacing: 0.01em;\n  color: var(--black); margin-bottom: 24px;\n}\n.section-title.lavender { color: var(--lavender); }\n.section-title.peach { color: var(--peach); }\n.reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.7s ease, transform 0.7s ease; }\n.reveal.visible { opacity: 1; transform: translateY(0); }\n\n/* Hero elements animate in via keyframe, not IntersectionObserver */\n#hero .reveal {\n  opacity: 0;\n  animation: heroFadeUp 0.9s ease forwards;\n}\n#hero .reveal.reveal-delay-1 { animation-delay: 0.15s; }\n#hero .reveal.reveal-delay-2 { animation-delay: 0.3s; }\n\n.hero-reveal {\n  animation: heroFadeUp 0.9s ease forwards;\n}\n@keyframes heroFadeUp {\n  from { opacity: 0; transform: translateY(40px); }\n  to   { opacity: 1; transform: translateY(0); }\n}\n.reveal-delay-1 { transition-delay: 0.1s; }\n.reveal-delay-2 { transition-delay: 0.2s; }\n.reveal-delay-3 { transition-delay: 0.3s; }\n.reveal-delay-4 { transition-delay: 0.4s; }\n\n/* ── MISIÓN ──────────────────────────────────── */\n#mision {\n  background: var(--off-white);\n  padding: 56px 48px;\n  display: grid; grid-template-columns: 1fr 1.4fr; gap: 48px;\n  align-items: center;\n}\n.mision-img {\n  aspect-ratio: 1/1;\n  background: linear-gradient(135deg, #3d2215 0%, #6b3d28 40%, #4a2318 100%);\n  position: relative; overflow: hidden;\n}\n.mision-img::after { ador-card { border-right: none; padding: 40px 0; }\n  .resultados-grid { grid-template-columns: repeat(2, 1fr); }\n  .resultado-card:last-child { border-right: none; }\n  .resultado-card:nth-child(2) { border-right: none; }\n  .equipo-grid { grid-template-columns: repeat(2, 1fr); }\n  .carreras-grid { grid-template-columns: 1fr; }\n  .aliados-grid { grid-template-columns: repeat(2, 1fr); }\n  .pathway { grid-template-columns: 1fr; }\n  .footer-grid { grid-template-columns: 1fr; }\n  .footer-bottom { flex-direction: column; gap: 8px; text-align: center; }\n}\n<\u002Fstyle>\n<style>/* ================================================\n   BRAND OVERRIDES — Orenda & Sherpa\n   Applied on top of orenda.css\n   ================================================ */\n\n/* ── ORENDA BRAND PALETTE ──\n   Teal: #27C3C0 / #009D97\n   Blue: #0164BF / #2CA2DA\n   Orange: #FF6600\n   Dark navy: #0C34A7\n   Light teal: #D4F5F4\n   ────────────────────────── */\n\n/* ── NAV: Orenda teal CTA ── */\n.nav-cta { background: #27C3C0; color: #FFFFFF; }\n.nav-cta:hover { background: #0C34A7; }\n#nav.scrolled .nav-cta { color: #FFFFFF; }\n\n/* ── HERO: Teal-to-navy gradient ── */\n#hero {\n  background: linear-gradient(135deg, #021A2E 0%, #04345A 35%, #065275 65%, #021A2E 100%);\n}\n.hero-photo-hint {\n  background: linear-gradient(135deg, #021A2E 0%, #053D5F 40%, #074E6A 70%, #021A2E 100%);\n}\n.hero-label { color: #27C3C0; }\n.hero-headline em { color: #27C3C0; }\n.btn-hero { background: #FF6600; color: #FFFFFF; }\n.btn-hero:hover { background: #27C3C0; color: #FFFFFF; }\n\n/* ── MARQUEE 1: Orenda teal ── */\n.marquee-strip:first-of-type {\n  background: #D4F5F4;\n  border-top-color: rgba(39,195,192,0.2);\n  border-bottom-color: rgba(39,195,192,0.2);\n}\n.marquee-strip:first-of-type .marquee-item { color: #009D97; }\n\n#mision .section-title { font-size: clamp(36px, 4vw, 56px); margin-bottom: 16px; }\n#mision .mision-accent { background: #27C3C0; }\n#mision .mision-img {\n  background: linear-gradient(135deg, #021A2E 0%, #065275 50%, #04345A 100%);\n}\n#mision .mision-quote { border-left-color: #27C3C0; }\n\n/* ── LA REALIDAD ── */\n#realidad { background: #FAFFFE; }\n#realidad .realidad-sub { color: #27C3C0; }\n.realidad-num { color: #2CA2DA; }\n\n/* ── MODELO ── */\n#modelo { background: #EFF9F9; }\n.pathway-dot { background: #27C3C0; border-color: #0164BF; }\n.pathway-arrow { color: #27C3C0; }\n\n/* ── CARRERAS ── */\n#carreras { background: #F0FAFA; }\n.carreras-bg-num { color: rgba(39,195,192,0.12); }\n.carrera-item:hover h4 { text-decoration-color: #27C3C0; }\n\n/* ── IMPACTO ── */\n#impacto { background: #021A2E; }\n.stat-number { color: #27C3C0; }\n.stat-number.lav { color: #2CA2DA; }\n\n/* ── FUNDADORA ── */\n#fundadora {\n  background: #D4F5F4;\n}\n#fundadora .fundadora-img {\n  background: linear-gradient(135deg, #021A2E 0%, #04345A 50%, #065275 100%);\n}\n#fundadora .fundadora-quote-mark { color: #009D97; }\n\n/* ── TESTIMONIOS ── */\n#testimonios { background: #FAFFFE; }\n.testimonio-accent { color: #27C3C0; }\n.testimonio-avatar { background: linear-gradient(135deg, #27C3C0, #0164BF); }\n\n/* ── ALIADOS ── */\n#aliados { background: #F0FAFA; }\n.aliado-item:hover { background: #D4F5F4; }\n\n/* ── MARQUEE 1 button override ── */\n#hero .btn-hero .arrow { transition: transform 0.2s; }\n\n/* =================================================\n   SHERPA BRAND PALETTE (oficial)\n   Dark:     #052f35 — verde oscuro profundo (fondo)\n   Teal:     #035966 — teal oscuro\n   Lime:     #b1ed0a — lima eléctrico (acento principal)\n   Lavender: #c7b5f3 — lavanda suave\n   Mint:     #31b498 — teal/menta\n   ================================================= */\n\n/* ── SHERPA DIVIDER ── */\n#sherpa-divider {\n  position: relative;\n  overflow: hidden;\n  min-height: 85vh;\n  display: flex;\n  align-items: center;\n  justify-content: center;\n  padding: 0;\n  background: #021a1e;\n}\n.sd3-mountains {\n  position: absolute; inset: 0; z-index: 0;\n  background: \n    linear-gradient(to bottom, rgba(2,26,30,0.55) 0%, rgba(2,26,30,0.3) 40%, rgba(2,26,30,0.65) 100%),\n    url(\"0c56099a-6821-45e7-ae34-cd5c6a9c1f91\") center center / cover no-repeat;\n}\n.sd3-svg { display: none; }\n.sd3-content {\n  position: relative; z-index: 2;\n  text-align: center;\n  padding: 0 48px;\n  max-width: 900px;\n}\n.sd3-tag {\n  font-size: 11px; font-weight: 700; letter-spacing: 0.2em;\n  text-transform: uppercase; color: #b1ed0a;\n  margin-bottom: 24px; display: block;\n}\n.sd3-headline {\n  display: flex; flex-direction: column; align-items: center;\n  gap: 0; margin-bottom: 32px;\n}\n.sd3-h-top {\n  font-family: 'Instrument Sans', sans-serif;\n  font-size: clamp(18px, 2vw, 26px);\n  font-weight: 400; letter-spacing: 0.3em;\n  text-transform: uppercase;\n  color: rgba(255,255,255,0.65);\n  display: block; margin-bottom: 4px;\n}\n.sd3-h-mid {\n  font-family: 'Bebas Neue', sans-serif;\n  font-size: clamp(100px, 16vw, 220px);\n  line-height: 0.82; letter-spacing: 0.02em;\n  color: #fff; display: block;\n}\n.sd3-h-mid em { font-style: normal; color: #b1ed0a; }\n.sd3-h-bot {\n  font-family: 'Instrument Sans', sans-serif;\n  font-size: clamp(14px, 1.4vw, 18px);\n  font-weight: 400; line-height: 1.6;\n  color: rgba(255,255,255,0.6);\n  letter-spacing: 0.02em;\n  display: block; margin-top: 12px;\n}\n.sd3-cta {\n  display: inline-flex; align-items: center; gap: 8px;\n  background: #b1ed0a; color: #021a1e;\n  font-size: 12px; font-weight: 700; letter-spacing: 0.1em;\n  text-transform: uppercase; padding: 14px 28px;\n  text-decoration: none; transition: all 0.2s;\n}\n.sd3-cta:hover { background: #fff; }\n@media (max-width: 768px) {\n  .sd3-content { padding: 0 24px; }\n  .sd3-h-mid { font-size: clamp(72px, 20vw, 120px); }\n}\n\n/* ── SHERPA HERO ── */\n#sherpa-hero { background: #052f35; }\n.sh-left-title { color: #b1ed0a; }\n.sh-left-tag { color: rgba(177,237,10,0.7); }\n\n/* ── SHERPA STATS ── */\n#sherpa-stats { background: #f0faf7; }\n.sherpa-stat-num { color: #035966; }\n.sherpa-stats-grid { border-color: #052f35; }\n.sherpa-stat-card { border-right-color: #052f35; }\n\n/* ── QUÉ ES ── */\n#que-es { background: #f8fffe; }\n.que-es-badge { background: #b1ed0a; color: #052f35; }\n.dimensiones-grid { background: #052f35; }\n.dimension-card { background: #f0faf7; }\n.dimension-card:hover { background: #e0f7f0; }\n.dimension-num { color: #31b498; }\n#que-es .dimension-icon svg rect,\n#que-es .dimension-icon svg path,\n#que-es .dimension-icon svg circle { stroke: #31b498; }\n#que-es .dimension-card:nth-child(even) .dimension-icon svg rect,\n#que-es .dimension-card:nth-child(even) .dimension-icon svg path,\n#que-es .dimension-card:nth-child(even) .dimension-icon svg circle { stroke: #035966; }\n#que-es .dimension-card:nth-child(even) .dimension-num { color: #035966; }\n\n/* ── CÓMO FUNCIONA ── */\n#como-funciona { background: #052f35; }\n.features-grid { border-color: rgba(177,237,10,0.15); }\n.feature-card {\n  border-right-color: rgba(177,237,10,0.15);\n  border-bottom-color: rgba(177,237,10,0.15);\n}\n.feature-card:hover { background: rgba(177,237,10,0.05); }\n.feature-num { color: #b1ed0a; }\n.feature-title { color: #FFFFFF; }\n\n/* ── PLATAFORMA ── */\n#plataforma { background: #021a1e; padding: 56px 48px; }\n.play-btn { border-color: #b1ed0a; color: #b1ed0a; }\n.video-placeholder:hover .play-btn { background: #b1ed0a; color: #052f35; }\n.video-placeholder:hover { border-color: #b1ed0a; }\n#plataforma .section-title { color: #FFFFFF; }\n#plataforma .video-placeholder { aspect-ratio: 21/6; }\n\n/* ── DIFERENCIADORES (nueva diagramación) ── */\n#diferenciadores {\n  padding: 100px 48px;\n  background: #f8fffe;\n  display: grid;\n  grid-template-columns: 1fr 1.6fr;\n  gap: 80px;\n  align-items: start;\n}\n.dif-header .section-title { font-size: clamp(40px, 5vw, 64px); }\n.dif-items { display: flex; flex-direction: column; border-top: 1px solid #052f35; }\n.dif-item {\n  display: grid; grid-template-columns: 80px 1fr; gap: 32px;\n  padding: 36px 0; border-bottom: 1px solid rgba(3,89,102,0.2);\n  align-items: start; cursor: default; transition: background 0.2s;\n}\n.dif-item:hover { background: rgba(177,237,10,0.04); }\n.dif-item-left { display: flex; flex-direction: column; align-items: flex-start; gap: 12px; padding-top: 4px; }\n.dif-num { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; color: #b1ed0a; letter-spacing: -0.02em; }\n.dif-line { width: 24px; height: 2px; background: rgba(3,89,102,0.3); }\n.dif-title { font-size: 22px; font-weight: 700; color: #052f35; margin-bottom: 10px; line-height: 1.2; }\n.dif-body { font-size: 15px; line-height: 1.7; color: var(--dark-gray); }\n@media (max-width: 768px) {\n  #diferenciadores { grid-template-columns: 1fr; gap: 40px; }\n  .dif-item { grid-template-columns: 56px 1fr; gap: 20px; }\n  .dif-num { font-size: 36px; }\n}\n\n/* ── RESULTADOS ── */\n#resultados { background: #035966; }\n.resultado-bar-fill { background: #b1ed0a; }\n.resultado-bar-fill.lav { background: #c7b5f3; }\n.resultado-card:nth-child(1) .resultado-pct,\n.resultado-card:nth-child(3) .resultado-pct { color: #b1ed0a; }\n.resultado-card:nth-child(2) .resultado-pct,\n.resultado-card:nth-child(4) .resultado-pct { color: #c7b5f3; }\n.resultado-bar { background: rgba(255,255,255,0.15); }\n\n/* ── EQUIPO ── */\n#equipo { background: #f0faf7; }\n.equipo-grid { border-top-color: #052f35; }\n.equipo-card { border-bottom-color: rgba(3,89,102,0.15); border-right-color: rgba(3,89,102,0.1); }\n.equipo-avatar { background: linear-gradient(135deg, #31b498, #035966); }\n\n/* ── FINAL CTA ── */\n#cta-final { background: #b1ed0a; }\n#cta-final .section-label { color: rgba(5,47,53,0.6); }\n#cta-final .cta-title { color: #052f35; }\n#cta-final .cta-title em { color: #035966; font-style: normal; }\n#cta-final .cta-body { color: rgba(5,47,53,0.8); }\n#cta-final .btn-cta { background: #052f35; color: #FFFFFF; }\n#cta-final .btn-cta:hover { background: #FFFFFF; color: #052f35; }\n#cta-final p[style] { color: rgba(5,47,53,0.6) !important; }\n\n/* ── MARQUEE 2: Sherpa lime ── */\n.marquee-strip:last-of-type {\n  background: #052f35;\n  border-top-color: rgba(177,237,10,0.2);\n  border-bottom-color: rgba(177,237,10,0.2);\n}\n.marquee-strip:last-of-type .marquee-item { color: #b1ed0a; }\n\n/* ── FOOTER ── */\nfooter { background: #021a1e; border-top-color: rgba(177,237,10,0.1); }\n.footer-logo { color: #FFFFFF; }\n.footer-logo span { color: #b1ed0a; }\n.footer-tagline { color: rgba(255,255,255,0.45); }\n.footer-col h5 { color: rgba(177,237,10,0.5); }\n.footer-col ul li a { color: rgba(255,255,255,0.65); }\n.footer-col ul li a:hover { color: #b1ed0a; }\n.footer-col p { color: rgba(255,255,255,0.45); }\n.footer-bottom { border-top-color: rgba(177,237,10,0.1); }\n.footer-bottom p { color: rgba(255,255,255,0.25); }\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<!-- ── MOBILE MENU ── -->\n<div class=\"mobile-menu\" id=\"mobile-menu\">\n  <button class=\"mobile-close\" id=\"mobile-close\">✕<\u002Fbutton>\n  <a href=\"#mision\">Orenda<\u002Fa>\n  <a href=\"#sherpa\">Sherpa<\u002Fa>\n  <a href=\"#testimonios\">Comunidad<\u002Fa>\n  <a href=\"#cta-final\">Contáctenos<\u002Fa>\n  <a href=\"#cta-final\" style=\"color:var(--peach)\">Conviértete en Aliado<\u002Fa>\n<\u002Fdiv>\n\n<!-- ── NAV ── -->\n<nav id=\"nav\">\n  <a href=\"#\" class=\"nav-logo\">Orenda<span>·<\u002Fspan>Sherpa<\u002Fa>\n  <ul class=\"nav-links\">\n    <li><a href=\"#mision\">Orenda<\u002Fa><\u002Fli>\n    <li><a href=\"#sherpa-hero\">Sherpa<\u002Fa><\u002Fli>\n    <li><a href=\"#testimonios\">Comunidad<\u002Fa><\u002Fli>\n    <li><a href=\"#cta-final\">Contáctenos<\u002Fa><\u002Fli>\n    <li><a href=\"#\">EN<\u002Fa><\u002Fli>\n  <\u002Ful>\n\n  <div class=\"nav-hamburger\" id=\"hamburger\">\n    <span><\u002Fspan><span><\u002Fspan><span><\u002Fspan>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<!-- ── HERO ── -->\n<section id=\"hero\">\n  <div class=\"hero-photo-hint\"><\u002Fdiv>\n  <div class=\"hero-bg\"><\u002Fdiv>\n  <div class=\"hero-grain\"><\u002Fdiv>\n  <div class=\"hero-label\">Fundación Orenda — Colombia<\u002Fdiv>\n  <div class=\"hero-content hero-reveal\">\n    <h1 class=\"hero-headline\">Una oportunidad<br>puede cambiar<br><em>un destino.<\u002Fem><\u002Fh1>\n    <p class=\"hero-sub\">Somos Fundación Orenda. Creamos Sherpa, el programa que prepara a jóvenes colombianos para la universidad y para la vida.<\u002Fp>\n    <p class=\"hero-body\">Acompañamiento académico, socioemocional, becas y mentoría — un camino integral desde el bachillerato hasta el primer empleo.<\u002Fp>\n    <div class=\"hero-ctas\">\n      <a href=\"mailto:gerencia@f-orenda.org\" class=\"btn-hero\">Sé Aliado<\u002Fa>\n      <a href=\"#sherpa-hero\" class=\"btn-hero-sec\">Conoce Sherpa ↓<\u002Fa>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n  <div class=\"scroll-indicator\">\n    <div class=\"scroll-line\"><\u002Fdiv>\n    <span>Scroll<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n\n<!-- ── MISIÓN ── -->\n<section id=\"mision\">\n  <div class=\"mision-img reveal\"><\u002Fdiv>\n  <div class=\"reveal reveal-delay-1\">\n    <div class=\"section-label\">NUESTRA ESENCIA<\u002Fdiv>\n    <div class=\"mision-accent\">✦<\u002Fdiv>\n    <h2 class=\"section-title\">Cada joven lleva dentro<br>una orenda — una fuerza<br>capaz de superar<br>cualquier adversidad.<\u002Fh2>\n    <div class=\"mision-body\">\n      <p>Nuestro propósito es ayudarle a descubrirla. Lo hacemos a través de educación, acompañamiento y mentoría — desde el colegio hasta el primer empleo.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"mision-quote\">\"Orenda\" significa la fuerza interior que habita en cada ser humano.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n\n<!-- ── MODELO ── -->\n<section id=\"modelo\">\n  <div class=\"modelo-intro reveal\">\n    <div class=\"section-label\">NUESTRO MODELO<\u002Fdiv>\n    <h2 class=\"section-title\">Del bachillerato al primer empleo.<br>Un camino con propósito.<\u002Fh2>\n    <p>Acompañamos a los jóvenes en cada etapa de su transformación. Comenzamos por la preparación académica y emocional, y los acompañamos hasta su primera oportunidad laboral.ral.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"pathway\" style=\"grid-template-columns: repeat(4,1fr)\">\n    <div class=\"pathway-step reveal\">\n      <div class=\"pathway-dot\"><\u002Fdiv>\n      <h4>01 · Sherpa<\u002Fh4>\n      <p style=\"font-size:11px;font-weight:700;color:var(--peach);margin-bottom:6px\">Preparación académica y socioemocional<\u002Fp>\n      <p>Plataforma educativa con IA, gamificación y mentoría humana para preparar el ICFES Saber 11 y la admisión universitaria.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"pathway-step reveal reveal-delay-1\">\n      <div class=\"pathway-dot\"><\u002Fdiv>\n      <div class=\"pathway-arrow\">→<\u002Fdiv>\n      <h4>02 · Becas<\u002Fh4>\n      <p style=\"font-size:11px;font-weight:700;color:var(--peach);margin-bottom:6px\">Becas universitarias<\u002Fp>\n      <p>Conectamos a los estudiantes con universidades aliadas y programas de beca de alta calidad para que puedan empezar la carrera que eligieron.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"pathway-step reveal reveal-delay-2\">\n      <div class=\"pathway-dot\"><\u002Fdiv>\n      <div class=\"pathway-arrow\">→<\u002Fdiv>\n      <h4>03 · Financiación<\u002Fh4>\n      <p style=\"font-size:11px;font-weight:700;color:var(--peach);margin-bottom:6px\">Financiación<\u002Fp>\n      <p>Acompañamos la búsqueda y gestión de financiación universitaria para que el dinero deje de ser la barrera entre el talento y el título.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"pathway-step reveal reveal-delay-3\">\n      <div class=\"pathway-dot\"><\u002Fdiv>\n      <div class=\"pathway-arrow\">→<\u002Fdiv>\n      <h4>04 · Mentoría<\u002Fh4>\n      <p style=\"font-size:11px;font-weight:700;color:var(--peach);margin-bottom:6px\">Mentoría laboral<\u002Fp>\n      <p>Mentoría profesional 1:1 durante los últimos semestres y el primer empleo — para que la transición al mundo laboral no se haga en solitario.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── ADRIANA LEÓN ── -->\n<section id=\"fundadora\">\n  <div class=\"fundadora-img reveal\"><\u002Fdiv>\n  <div class=\"reveal reveal-delay-1\">\n    <div class=\"section-label\">QUIÉN ESTÁ DETRÁS<\u002Fdiv>\n    <h2 class=\"section-title\">Orenda nació del sueño<br>de una mujer que cree<br>en el poder de una<br>sola oportunidad.<\u002Fh2>\n    <div class=\"fundadora-quote-mark\">“<\u002Fdiv>\n    <p class=\"fundadora-quote\">Trabajamos cada día para que más jóvenes puedan imaginar un futuro distinto y construirlo con las herramientas que reciben hoy.<\u002Fp>\n    <div class=\"fundadora-attribution\">Adriana León · Fundadora y CEO, Fundación Orenda<\u002Fdiv>\n    <p class=\"fundadora-bio\">Senior Fellow del Harvard Advanced Leadership Initiative. 20 años de carrera corporativa liderando marketing en Unilever y Varta. Miembro del consejo de Enseña por Colombia y Assist Scholars.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n\n<!-- ── ALIADOS ── -->\n<section id=\"aliados\">\n  <div class=\"reveal\">\n    <div class=\"section-label\">ALIADOS<\u002Fdiv>\n    <h2 class=\"section-title\">Organizaciones que<br>confían en Orenda para<br>transformar Colombia.<\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"aliados-grid reveal reveal-delay-1\">\n    <div class=\"aliado-item\">Citi<\u002Fdiv>\n    <div class=\"aliado-item\">Crepes &amp; Waffles<\u002Fdiv>\n    <div class=\"aliado-item\">U. El Bosque<\u002Fdiv>\n    <div class=\"aliado-item\">Alianza Educativa<\u002Fdiv>\n    <div class=\"aliado-item\">Fund. Bancolombia<\u002Fdiv>\n    <div class=\"aliado-item\">Sabio Caldas<\u002Fdiv>\n    <div class=\"aliado-item\">U. Javeriana<\u002Fdiv>\n    <div class=\"aliado-item\">Esc. Col. Ingeniería<\u002Fdiv>\n    <div class=\"aliado-item\">DO-IT<\u002Fdiv>\n    <div class=\"aliado-item\">C&amp;W<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── SHERPA DIVIDER ── -->\n<!-- ── SHERPA DIVIDER ── -->\n<section id=\"sherpa-divider\">\n  <!-- SVG mountain layers — back to front -->\n  <div class=\"sd3-mountains\">\n    <svg class=\"sd3-svg\" viewBox=\"0 0 1440 600\" preserveAspectRatio=\"xMidYMax slice\" xmlns=\"http://www.w3.org/2000/svg\">\n      <defs>\n        <!-- Background sky -->\n        <linearGradient id=\"sd3sky\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#010c0e\"><\u002Fstop>\n          <stop offset=\"60%\" stop-color=\"#021a1e\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#031f24\"><\u002Fstop>\n        <\u002FlinearGradient>\n        <!-- Mountain layers -->\n        <linearGradient id=\"sd3m0\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#073540\" stop-opacity=\"0.5\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#031f24\" stop-opacity=\"0.5\"><\u002Fstop>\n        <\u002FlinearGradient>\n        <linearGradient id=\"sd3m1\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#094050\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#031f24\"><\u002Fstop>\n        <\u002FlinearGradient>\n        <linearGradient id=\"sd3m2\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#063540\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#021a1e\"><\u002Fstop>\n        <\u002FlinearGradient>\n        <linearGradient id=\"sd3m3\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#042830\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#010d10\"><\u002Fstop>\n        <\u002FlinearGradient>\n        <linearGradient id=\"sd3m4\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#031e24\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#010d10\"><\u002Fstop>\n        <\u002FlinearGradient>\n        <!-- Fog/mist overlay -->\n        <linearGradient id=\"sd3fog\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0%\" stop-color=\"#021a1e\" stop-opacity=\"0\"><\u002Fstop>\n          <stop offset=\"40%\" stop-color=\"#021a1e\" stop-opacity=\"0.45\"><\u002Fstop>\n          <stop offset=\"60%\" stop-color=\"#021a1e\" stop-opacity=\"0.55\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#021a1e\" stop-opacity=\"0\"><\u002Fstop>\n        <\u002FlinearGradient>\n        <!-- Lime glow on peak -->\n        <radialGradient id=\"sd3glow\" cx=\"55%\" cy=\"20%\" r=\"30%\">\n          <stop offset=\"0%\" stop-color=\"#b1ed0a\" stop-opacity=\"0.12\"><\u002Fstop>\n          <stop offset=\"100%\" stop-color=\"#b1ed0a\" stop-opacity=\"0\"><\u002Fstop>\n        <\u002FradialGradient>\n      <\u002Fdefs>\n\n      <!-- Sky -->\n      <rect width=\"1440\" height=\"600\" fill=\"url(#sd3sky)\"><\u002Frect>\n\n      <!-- Stars -->\n      <circle cx=\"120\" cy=\"40\" r=\"1\" fill=\"#b1ed0a\" opacity=\"0.5\"><\u002Fcircle>\n      <circle cx=\"280\" cy=\"22\" r=\"0.8\" fill=\"#fff\" opacity=\"0.3\"><\u002Fcircle>\n      <circle cx=\"480\" cy=\"35\" r=\"1.2\" fill=\"#fff\" opacity=\"0.25\"><\u002Fcircle>\n      <circle cx=\"650\" cy=\"18\" r=\"0.8\" fill=\"#b1ed0a\" opacity=\"0.35\"><\u002Fcircle>\n      <circle cx=\"900\" cy=\"28\" r=\"1\" fill=\"#fff\" opacity=\"0.3\"><\u002Fcircle>\n      <circle cx=\"1150\" cy=\"15\" r=\"1.2\" fill=\"#b1ed0a\" opacity=\"0.45\"><\u002Fcircle>\n      <circle cx=\"1350\" cy=\"38\" r=\"0.8\" fill=\"#fff\" opacity=\"0.3\"><\u002Fcircle>\n\n      <!-- Layer 0: very far, faint -->\n      <path d=\"M0,600 L0,350 C120,310 220,270 340,250 C460,230 540,240 620,225 C700,210 760,190 830,175 C900,160 970,165 1040,180 C1110,195 1180,215 1280,240 C1360,260 1410,280 1440,295 L1440,600Z\" fill=\"url(#sd3m0)\"><\u002Fpath>\n\n      <!-- Layer 1: back mountains -->\n      <path d=\"M0,600 L0,400 C80,370 170,340 260,320 C350,300 420,305 500,290 C580,275 640,255 700,238 C760,221 810,210 870,202 C930,194 990,200 1060,215 C1130,230 1190,250 1270,268 C1350,286 1410,305 1440,318 L1440,600Z\" fill=\"url(#sd3m1)\"><\u002Fpath>\n\n      <!-- Layer 2: mid mountains, main peak center-right -->\n      <path d=\"M0,600 L0,480 C60,455 130,435 200,418 C270,401 330,400 390,388 C450,376 500,360 555,342 C610,324 655,308 700,292 C745,276 783,262 820,248 C857,234 885,223 920,215 C955,207 990,208 1030,218 C1070,228 1105,245 1150,258 C1195,271 1240,278 1295,292 C1350,306 1405,325 1440,340 L1440,600Z\" fill=\"url(#sd3m2)\"><\u002Fpath>\n\n      <!-- Layer 3: closer mountains, tall peak left-center -->\n      <path d=\"M0,600 L0,540 C40,520 90,505 140,492 C190,479 235,475 280,465 C325,455 365,443 405,428 C445,413 480,396 515,378 C550,360 578,342 608,322 C638,302 663,282 690,262 C717,242 740,225 766,212 C792,199 816,195 845,200 C874,205 900,220 930,238 C960,256 992,278 1030,295 C1068,312 1110,323 1160,336 C1210,349 1265,362 1320,378 C1375,394 1415,412 1440,425 L1440,600Z\" fill=\"url(#sd3m3)\"><\u002Fpath>\n\n      <!-- Layer 4: foreground dark -->\n      <path d=\"M0,600 L0,570 C60,555 130,542 200,530 C270,518 330,512 390,502 C450,492 500,480 550,465 C600,450 645,433 690,415 C735,397 772,380 810,362 C848,344 880,328 915,315 C950,302 988,295 1030,295 C1072,295 1110,302 1155,315 C1200,328 1245,346 1295,362 C1345,378 1400,395 1440,408 L1440,600Z\" fill=\"url(#sd3m4)\"><\u002Fpath>\n\n      <!-- Lime peak accent -->\n      <path d=\"M845,200 L822,220 L832,224 L812,244 L848,234 L862,252 L868,232 L884,230 L860,200Z\" fill=\"#b1ed0a\" opacity=\"0.8\"><\u002Fpath>\n\n      <!-- Lime glow -->\n      <ellipse cx=\"845\" cy=\"210\" rx=\"180\" ry=\"100\" fill=\"url(#sd3glow)\"><\u002Fellipse>\n\n      <!-- Mist/fog band in center (where text lives) -->\n      <rect width=\"1440\" height=\"600\" fill=\"url(#sd3fog)\"><\u002Frect>\n    <\u002Fsvg>\n  <\u002Fdiv>\n\n  <!-- Centered text — overlapping the mountain layers -->\n  <div class=\"sd3-content reveal\">\n    <div class=\"sd3-tag\">\n<\u002Fdiv>\n    <h2 class=\"sd3-headline\">\n      <span class=\"sd3-h-top\">Conoce<\u002Fspan>\n      <span class=\"sd3-h-mid\"><em>Sherpa<\u002Fem><\u002Fspan>\n      <span class=\"sd3-h-bot\">Y así comienza el camino.<br>Conoce nuestro programa estrella.<\u002Fspan>\n    <\u002Fh2>\n    <a href=\"#sherpa-hero\" class=\"sd3-cta\">Conoce el programa ↗<\u002Fa>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<!-- ── SHERPA HERO ── -->\n<section id=\"sherpa-hero\">\n  <!-- Left: headline -->\n  <div class=\"sh-left reveal\">\n    <div class=\"sh-left-tag\">SHERPA · Un programa de Fundación Orenda<\u002Fdiv>\n    <h2 class=\"sh-left-title\">Sherpa<\u002Fh2>\n    <p class=\"sh-left-sub\">Preparamos a los jóvenes para la universidad y para la vida.<\u002Fp>\n    <p style=\"font-size:14px;color:rgba(255,255,255,0.55);margin-bottom:32px;line-height:1.6\">Sherpa es una plataforma educativa con inteligencia artificial, gamificación y acompañamiento humano que prepara a estudiantes de grado 11 para el ICFES Saber 11 y la admisión a la Universidad Nacional. 19 semanas. 6 áreas de conocimiento. Una ruta personalizada para cada estudiante.<\u002Fp>\n    <a href=\"mailto:gerencia@f-orenda.org\" class=\"sh-left-cta\">Sé Aliado de Sherpa <span>↗<\u002Fspan><\u002Fa>\n  <\u002Fdiv>\n\n  <!-- Right: accordion -->\n  <div class=\"sh-accordion reveal reveal-delay-1\">\n    <div class=\"sh-acc-item sh-acc-open\" data-acc=\"\">\n      <button class=\"sh-acc-header\">\n        <span>¿Quiénes somos?<\u002Fspan>\n        <span class=\"sh-acc-icon\">−<\u002Fspan>\n      <\u002Fbutton>\n      <div class=\"sh-acc-body\">\n        <p>Somos un programa que prepara a jóvenes de manera integral para construir un plan de vida, haciendo realidad sus sueños y contribuyendo al cambio en Colombia.<\u002Fp>\n        <a href=\"#que-es\" class=\"sh-acc-link\">→<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sh-acc-item\" data-acc=\"\">\n      <button class=\"sh-acc-header\">\n        <span>Preparación ICFES Saber 11<\u002Fspan>\n        <span class=\"sh-acc-icon\">+<\u002Fspan>\n      <\u002Fbutton>\n      <div class=\"sh-acc-body\">\n        <p>Plataforma educativa con IA, gamificación y mentoría humana. 19 semanas, 6 áreas de conocimiento, una ruta personalizada para preparar el ICFES y la admisión a la Universidad Nacional.<\u002Fp>\n        <a href=\"#como-funciona\" class=\"sh-acc-link\">→<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sh-acc-item sh-acc-lime\" data-acc=\"\">\n      <button class=\"sh-acc-header\">\n        <span>Acompañamiento socioemocional<\u002Fspan>\n        <span class=\"sh-acc-icon\">+<\u002Fspan>\n      <\u002Fbutton>\n      <div class=\"sh-acc-body\">\n        <p>SherpiAmigo, nuestra IA emocional, clasifica el nivel de riesgo y acompaña al estudiante en el manejo de ansiedad, estrés y motivación. Porque prepararse también es un reto emocional.<\u002Fp>\n        <a href=\"#que-es\" class=\"sh-acc-link\">→<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sh-acc-item sh-acc-dark\" data-acc=\"\">\n      <button class=\"sh-acc-header\">\n        <span>Resultados medibles<\u002Fspan>\n        <span class=\"sh-acc-icon\">+<\u002Fspan>\n      <\u002Fbutton>\n      <div class=\"sh-acc-body\">\n        <p>70% ingresa a la universidad. 97% completa el programa. +15 puntos sobre la media nacional en Saber 11. Resultados reales, no promesas.<\u002Fp>\n        <a href=\"#resultados\" class=\"sh-acc-link\">→<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── SHERPA STATS ── -->\n<section id=\"sherpa-stats\" style=\"background-color: rgb(177, 237, 10)\">\n  <div class=\"reveal\">\n    <div class=\"section-label\">POR QUÉ EXISTE SHERPA<\u002Fdiv>\n    <h2 class=\"section-title\">En Colombia, el talento<br>sobra. Las oportunidades<br>para desarrollarlo, no.<\u002Fh2>\n  <\u002Fdiv>\n  <p style=\"font-size:16px;color:var(--dark-gray);max-width:540px;margin-bottom:48px\" class=\"reveal reveal-delay-1\">Estos tres datos resumen la brecha que Sherpa existe para cerrar.<\u002Fp>\n  <div class=\"sherpa-stats-grid\">\n    <div class=\"sherpa-stat-card reveal\">\n      <div class=\"sherpa-stat-num\" data-target=\"7%\">7%<\u002Fdiv>\n      <div class=\"sherpa-stat-text\"><strong>completa una carrera universitaria<\u002Fstrong><br>Solo el 7% de los bachilleres colombianos logra graduarse de la universidad. (DNP 2022)<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sherpa-stat-card reveal reveal-delay-1\">\n      <div class=\"sherpa-stat-num\" data-target=\"78\">78<span style=\"font-size:0.5em\">pts<\u002Fspan><\u002Fdiv>\n      <div class=\"sherpa-stat-text\"><strong>de brecha en el Saber 11<\u002Fstrong><br>Existe una diferencia de 78 puntos en el ICFES entre niveles socioeconómicos altos y bajos.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"sherpa-stat-card reveal reveal-delay-2\">\n      <div class=\"sherpa-stat-num\" data-target=\"28%\">28%<\u002Fdiv>\n      <div class=\"sherpa-stat-text\"><strong>no estudia ni trabaja<\u002Fstrong><br>El 28% de los jóvenes entre 14 y 28 años está fuera del sistema educativo y laboral. (SPADIES 2022)<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── QUÉ ES ── -->\n<section id=\"que-es\">\n  <div class=\"que-es-intro reveal\">\n    <div class=\"section-label\">QUÉ ES SHERPA<\u002Fdiv>\n    <h2 class=\"section-title\">Preparación integral<br>en 4 dimensiones.<\u002Fh2>\n    <p style=\"font-size:17px;line-height:1.7;color:var(--dark-gray);margin-top:16px\">Partimos de las debilidades reales de cada estudiante en el ICFES y construimos un programa personalizado de 19 semanas que integra lo académico, lo socioemocional, lo vocacional y la autogestión.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"que-es-badge reveal reveal-delay-1\">⏱ 19 semanas · Virtual + sesiones presenciales<\u002Fdiv>\n  <div class=\"dimensiones-grid\">\n    <div class=\"dimension-card reveal\">\n      <div class=\"dimension-num\">01<\u002Fdiv>\n      <div class=\"dimension-icon\">\n        <svg viewBox=\"0 0 48 48\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n          <rect x=\"4\" y=\"8\" width=\"40\" height=\"32\" rx=\"2\" stroke=\"#FF8F75\" stroke-width=\"2\"><\u002Frect>\n          <path d=\"M14 24h20M14 18h12M14 30h16\" stroke=\"#FF8F75\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <h3 class=\"dimension-title\">Habilidades académicas<\u002Fh3>\n      <p class=\"dimension-body\">Matemáticas, ciencias, lectura crítica e inglés. Foco en las áreas donde cada estudiante muestra más brechas según diagnóstico.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"dimension-card reveal reveal-delay-1\">\n      <div class=\"dimension-num\">02<\u002Fdiv>\n      <div class=\"dimension-icon\">\n        <svg viewBox=\"0 0 48 48\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n          <circle cx=\"24\" cy=\"24\" r=\"18\" stroke=\"#B5A3D8\" stroke-width=\"2\"><\u002Fcircle>\n          <path d=\"M16 28c0-4.4 3.6-8 8-8s8 3.6 8 8\" stroke=\"#B5A3D8\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fpath>\n          <circle cx=\"24\" cy=\"18\" r=\"3\" fill=\"#B5A3D8\"><\u002Fcircle>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <h3 class=\"dimension-title\">Preparación socioemocional<\u002Fh3>\n      <p class=\"dimension-body\">Manejo de ansiedad, motivación y resiliencia. Esencial para el examen, la carrera y la vida.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"dimension-card reveal\">\n      <div class=\"dimension-num\">03<\u002Fdiv>\n      <div class=\"dimension-icon\">\n        <svg viewBox=\"0 0 48 48\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n          <path d=\"M8 40L24 12l16 28H8z\" stroke=\"#FF8F75\" stroke-width=\"2\" stroke-linejoin=\"round\"><\u002Fpath>\n          <path d=\"M24 12v28\" stroke=\"#FF8F75\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-dasharray=\"4 4\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <h3 class=\"dimension-title\">Orientación vocacional<\u002Fh3>\n      <p class=\"dimension-body\">Autoconocimiento y exploración profesional para que cada estudiante tome decisiones informadas sobre su futuro.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"dimension-card reveal reveal-delay-1\">\n      <div class=\"dimension-num\">04<\u002Fdiv>\n      <div class=\"dimension-icon\">\n        <svg viewBox=\"0 0 48 48\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n          <path d=\"M12 36V20l12-8 12 8v16\" stroke=\"#B5A3D8\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath>\n          <rect x=\"18\" y=\"28\" width=\"12\" height=\"8\" stroke=\"#B5A3D8\" stroke-width=\"2\"><\u002Frect>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <h3 class=\"dimension-title\">Autogestión y disciplina<\u002Fh3>\n      <p class=\"dimension-body\">Autorregulación y mentalidad de crecimiento, fortalecidas a través de retos en la plataforma gamificada.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── CÓMO FUNCIONA ── -->\n<section id=\"como-funciona\">\n  <div class=\"reveal\">\n    <div class=\"section-label\">TECNOLOGÍA AL SERVICIO DEL ESTUDIANTE<\u002Fdiv>\n    <h2 class=\"section-title\">La plataforma que<br>cierra brechas,<br>no las profundiza.<\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"features-grid\">\n    <div class=\"feature-card reveal\">\n      <div class=\"feature-num\">01<\u002Fdiv>\n      <h3 class=\"feature-title\">🎮 Cápsulas + gamificación<\u002Fh3>\n      <p class=\"feature-body\">Los estudiantes completan retos cortos que desarrollan pensamiento crítico y resolución de problemas.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"feature-card reveal reveal-delay-1\">\n      <div class=\"feature-num\">02<\u002Fdiv>\n      <h3 class=\"feature-title\">📊 Reportes individuales semanales<\u002Fh3>\n      <p class=\"feature-body\">La data de cada estudiante genera reportes que identifican sus dificultades específicas, semana a semana.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"feature-card reveal reveal-delay-2\">\n      <div class=\"feature-num\">03<\u002Fdiv>\n      <h3 class=\"feature-title\">🤖 Sherpi · IA académica 24/7<\u002Fh3>\n      <p class=\"feature-body\">Asistente de inteligencia artificial que resuelve dudas, genera resúmenes y sugiere recursos en tiempo real. Día y noche.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"feature-card reveal\">\n      <div class=\"feature-num\">04<\u002Fdiv>\n      <h3 class=\"feature-title\">🧠 SherpiAmigo · IA socioemocional<\u002Fh3>\n      <p class=\"feature-body\">Compañero de IA que clasifica nivel de riesgo emocional y activa protocolos de apoyo cuando es necesario.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"feature-card reveal reveal-delay-1\">\n      <div class=\"feature-num\">05<\u002Fdiv>\n      <h3 class=\"feature-title\">📝 4 simulacros tipo Saber 11<\u002Fh3>\n      <p class=\"feature-body\">Réplica del examen real con temporizador, retroalimentación y análisis por competencia.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"feature-card reveal reveal-delay-2\">\n      <div class=\"feature-num\">06<\u002Fdiv>\n      <h3 class=\"feature-title\">👥 Sesiones presenciales<\u002Fh3>\n      <p class=\"feature-body\">Complementan la plataforma con interacción humana directa y 20 minutos de práctica autónoma diaria.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── PLATAFORMA ── -->\n<section id=\"plataforma\">\n  <div class=\"reveal\">\n    <div class=\"section-label\">LA PLATAFORMA<\u002Fdiv>\n    <h2 class=\"section-title\" style=\"color:var(--white)\">Así se ve Sherpa<br>por dentro.<\u002Fh2>\n  <\u002Fdiv>\n  <p class=\"plataforma-sub reveal reveal-delay-1\">Una experiencia diseñada para enganchar al estudiante y producir resultados medibles.<\u002Fp>\n  <div class=\"video-placeholder reveal reveal-delay-2\">\n    <div class=\"play-btn\">▶<\u002Fdiv>\n    <p>PRÓXIMAMENTE: VIDEO DEMO INTERACTIVO DE LA PLATAFORMA<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── DIFERENCIADORES ── -->\n<section id=\"diferenciadores\">\n  <div class=\"dif-header reveal\">\n    <div class=\"section-label\">LA DIFERENCIA<\u002Fdiv>\n    <h2 class=\"section-title\">Esto no es otro<br>curso pre-ICFES.<\u002Fh2>\n  <\u002Fdiv>\n  <div class=\"dif-items\">\n    <div class=\"dif-item reveal\">\n      <div class=\"dif-item-left\">\n        <span class=\"dif-num\">01<\u002Fspan>\n        <div class=\"dif-line\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dif-item-right\">\n        <h3 class=\"dif-title\">Construido sobre debilidades reales<\u002Fh3>\n        <p class=\"dif-body\">El programa parte del diagnóstico individual de cada estudiante. Nadie estudia lo que ya sabe.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dif-item reveal reveal-delay-1\">\n      <div class=\"dif-item-left\">\n        <span class=\"dif-num\">02<\u002Fspan>\n        <div class=\"dif-line\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dif-item-right\">\n        <h3 class=\"dif-title\">Prepara para la vida, no solo para un examen<\u002Fh3>\n        <p class=\"dif-body\">Pensamiento crítico, manejo emocional y disciplina que sirven mucho más allá del ICFES.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"dif-item reveal reveal-delay-2\">\n      <div class=\"dif-item-left\">\n        <span class=\"dif-num\">03<\u002Fspan>\n        <div class=\"dif-line\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"dif-item-right\">\n        <h3 class=\"dif-title\">Diseño instruccional de talla mundial<\u002Fh3>\n        <p class=\"dif-body\">Equipo formado en NYU, Universidad de los Andes y Harvard. Metodologías Teaching for Understanding e instrucción diferenciada.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── RESULTADOS ── -->\n<section id=\"resultados\">\n  <div class=\"reveal\">\n    <div class=\"section-label\">RESULTADOS<\u002Fdiv>\n    <h2 class=\"section-title\">Los números<br>que importan.<\u002Fh2>\n  <\u002Fdiv>\n  <p class=\"impacto-sub reveal reveal-delay-1\">Resultados reales de los jóvenes que han pasado por Sherpa, nuestras becas, financiación y acompañamiento integral.<\u002Fp>\n  <div class=\"impacto-grid\">\n    <div class=\"stat-card reveal\">\n      <div class=\"stat-number\" data-target=\"70%\">70%<\u002Fdiv>\n      <div class=\"stat-label\">ingresan a la universidad. Siete de cada diez estudiantes que pasan por Sherpa son admitidos en educación superior.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-card reveal reveal-delay-1\">\n      <div class=\"stat-number lav\" data-target=\"97%\">97%<\u002Fdiv>\n      <div class=\"stat-label\">completan el programa. Un nivel de retención atípico en programas de este tipo.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-card reveal reveal-delay-2\">\n      <div class=\"stat-number\" data-target=\"+15\">+15<\u002Fdiv>\n      <div class=\"stat-label\">puntos sobre la media nacional en Saber 11. Los estudiantes Sherpa puntúan en promedio 15 puntos por encima.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-card reveal\">\n      <div class=\"stat-number lav\" data-target=\"+17\">+17<\u002Fdiv>\n      <div class=\"stat-label\">becados a universidades de alta calidad para estudiar la carrera de su elección.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-card reveal reveal-delay-1\">\n      <div class=\"stat-number\" data-target=\"+430\">+430<\u002Fdiv>\n      <div class=\"stat-label\">estudiantes participantes han pasado por nuestros programas en los últimos años.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"stat-card reveal reveal-delay-2\">\n      <div class=\"stat-number lav\" data-target=\"100%\">100%<\u002Fdiv>\n      <div class=\"stat-label\">recomienda el programa. Cada estudiante que termina Sherpa lo recomiendaría a otro joven.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ── TESTIMONIOS + CARRERAS ── -->\n<section id=\"testimonios\">\n  <div class=\"reveal\">\n    <div class=\"section-label\">VIDAS TRANSFORMADAS<\u002Fdiv>\n    <h2 class=\"section-title\">Donde los sueños<br>se vuelven realidad.<\u002Fh2>\n    <p style=\"font-size:17px;color:var(--dark-gray);max-width:520px;margin-top:16px;line-height:1.6\">Tres jóvenes que pasaron por Sherpa y hoy están construyendo lo que parecía imposible.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"testimonios-grid\">\n    <div class=\"testimonio-card reveal\">\n      <div class=\"testimonio-accent\">❝<\u002Fdiv>\n      <p class=\"testimonio-text\">Gracias a Sherpa encontré estrategias para desempeñarme mejor en muchas áreas de mi vida.<\u002Fp>\n      <div class=\"testimonio-avatar\"><\u002Fdiv>\n      <div class=\"testimonio-name\">Hanna López<\u002Fdiv>\n      <div class=\"testimonio-role\">Ing. Mecánica · Escuela Col. de Ingeniería<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"testimonio-card reveal reveal-delay-1\">\n      <div class=\"testimonio-accent\">❝<\u002Fdiv>\n      <p class=\"testimonio-text\">Esta beca fue un voto de confianza en mí — la prueba de que alguien creyó en mi capacidad como estudiante.<\u002Fp>\n      <div class=\"testimonio-avatar\" style=\"background:linear-gradient(135deg,#31b498,#035966)\"><\u002Fdiv>\n      <div class=\"testimonio-name\">Yemmy Tatiana Rivera<\u002Fdiv>\n      <div class=\"testimonio-role\">Ing. Civil · U. Javeriana<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"testimonio-card reveal reveal-delay-2\">\n      <div class=\"testimonio-accent\">❝<\u002Fdiv>\n      <p class=\"testimonio-text\">Estoy cumpliendo una promesa conmigo mismo. Celebramos el triunfo de ser el primer abogado de la familia.<\u002Fp>\n      <div class=\"testimonio-avatar\" style=\"background:linear-gradient(135deg,#c7b5f3,#035966)\"><\u002Fdiv>\n      <div class=\"testimonio-name\">Juan Diego García<\u002Fdiv>\n      <div class=\"testimonio-role\">Derecho · U. Sto. Tomás Villavicencio<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"reveal\" style=\"margin-top:64px\">\n    <div class=\"section-label\" style=\"margin-bottom:24px\">ALGUNAS DE LAS CARRERAS QUE ESTÁN CONSTRUYENDO<\u002Fdiv>\n    <div class=\"carreras-grid\">\n      <div class=\"carrera-item\"><h4>Derecho<\u002Fh4><span>Pontificia Universidad Javeriana<\u002Fspan><\u002Fdiv>\n      <div class=\"carrera-item\"><h4>Ing. Industrial<\u002Fh4><span>Pontificia Universidad Javeriana<\u002Fspan><\u002Fdiv>\n      <div class=\"carrera-item\"><h4>Ing. de Sistemas<\u002Fh4><span>Pontificia Universidad Javeriana<\u002Fspan><\u002Fdiv>\n      <div class=\"carrera-item\"><h4>Enfermería<\u002Fh4><span>Pontificia Universidad Javeriana<\u002Fspan><\u002Fdiv>\n      <div class=\"carrera-item\"><h4>Medicina<\u002Fh4><span>Universidad Militar<\u002Fspan><\u002Fdiv>\n      <div class=\"carrera-item\"><h4>Ing. Industrial<\u002Fh4><span>Universidad El Bosque<\u002Fspan><\u002Fdiv>\n      <div class=\"carrera-item\"><h4>Ing. Civil<\u002Fh4><span>Escuela Colombiana de Ingeniería<\u002Fspan><\u002Fdiv>\n      <div class=\"carrera-item\"><h4>Derecho<\u002Fh4><span>U. Santo Tomás Villavicencio<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n\n<section id=\"equipo\">\n  <div class=\"eq-hero\">\n    <!-- Left: active member info -->\n    <div class=\"eq-left\">\n      <div class=\"eq-bg\" id=\"eq-bg\"><\u002Fdiv>\n      <div class=\"eq-overlay\"><\u002Fdiv>\n      <div class=\"eq-left-content\">\n        <div class=\"section-label eq-label\">QUIÉNES LO CONSTRUYEN<\u002Fdiv>\n        <div class=\"eq-role\" id=\"eq-role\">Ph.D Teaching Learning · NYU<\u002Fdiv>\n        <h2 class=\"eq-name\" id=\"eq-name\">María Angela<br>Crane<\u002Fh2>\n        <p class=\"eq-bio\" id=\"eq-bio\">Educadores, científicos de datos e ingenieros con formación en NYU, Andes y Harvard, dedicados a que cada estudiante llegue más lejos.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Right: scrollabl
